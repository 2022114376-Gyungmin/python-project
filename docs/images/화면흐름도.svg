<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1150" font-family="NanumGothic, sans-serif">
  
  <rect width="900" height="1150" fill="#FAFAFA"/>
  
  <text x="450" y="50" font-size="28" font-weight="bold" fill="#1A2530" text-anchor="middle">대시보드 화면 흐름 설계</text>
  <text x="450" y="80" font-size="16" fill="#666" text-anchor="middle" font-style="italic">대구 함지산 NDVI 분석 대시보드</text>
  <line x1="100" y1="105" x2="800" y2="105" stroke="#1FA098" stroke-width="2"/>
  
  <circle cx="120" cy="180" r="25" fill="#1FA098"/>
  <text x="120" y="188" font-size="20" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <rect x="170" y="140" width="600" height="100" rx="10" fill="white" stroke="#1FA098" stroke-width="2"/>
  <text x="190" y="170" font-size="18" font-weight="bold" fill="#1FA098">시작 화면 (대시보드 접속)</text>
  <text x="190" y="200" font-size="14" fill="#1A1A1A">• 사용자가 브라우저로 Streamlit 대시보드 접속</text>
  <text x="190" y="222" font-size="14" fill="#1A1A1A">• 제목: "대구 함지산 NDVI 분석 대시보드"</text>
  
  <line x1="450" y1="255" x2="450" y2="295" stroke="#1FA098" stroke-width="3"/>
  <polygon points="445,290 450,300 455,290" fill="#1FA098"/>
  
  <circle cx="120" cy="350" r="25" fill="#1FA098"/>
  <text x="120" y="358" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <rect x="170" y="310" width="600" height="100" rx="10" fill="white" stroke="#1FA098" stroke-width="2"/>
  <text x="190" y="340" font-size="18" font-weight="bold" fill="#1FA098">프로젝트 정보 확인</text>
  <text x="190" y="370" font-size="14" fill="#1A1A1A">• 함지산 산불 개요 (260헥타르 피해) 표시</text>
  <text x="190" y="392" font-size="14" fill="#1A1A1A">• 분석 방법 안내: "같은 계절끼리 비교 (작년 5월 vs 올해 5월)"</text>
  
  <line x1="450" y1="425" x2="450" y2="465" stroke="#1FA098" stroke-width="3"/>
  <polygon points="445,460 450,470 455,460" fill="#1FA098"/>
  
  <circle cx="120" cy="520" r="25" fill="#C62828"/>
  <text x="120" y="528" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <rect x="170" y="480" width="600" height="100" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="190" y="510" font-size="18" font-weight="bold" fill="#C62828">[분석 시작] 버튼 클릭</text>
  <text x="190" y="540" font-size="14" fill="#1A1A1A">• 사용자 액션: 빨간색 메인 버튼 클릭</text>
  <text x="190" y="562" font-size="14" fill="#1A1A1A">• 트리거: compare_before_after() 메인 함수 호출</text>
  
  <line x1="450" y1="595" x2="450" y2="635" stroke="#1FA098" stroke-width="3"/>
  <polygon points="445,630 450,640 455,630" fill="#1FA098"/>
  
  <circle cx="120" cy="690" r="25" fill="#F57C00"/>
  <text x="120" y="698" font-size="20" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <rect x="170" y="650" width="600" height="100" rx="10" fill="#FFF8E1" stroke="#F57C00" stroke-width="2"/>
  <text x="190" y="680" font-size="18" font-weight="bold" fill="#F57C00">분석 중 (백엔드 처리)</text>
  <text x="190" y="710" font-size="14" fill="#1A1A1A">• 함수 1 → 함수 2 → 함수 3 → 함수 4 순차 실행</text>
  <text x="190" y="732" font-size="14" fill="#1A1A1A">• 로딩 스피너: "위성영상 분석 중... (약 10~20초 소요)"</text>
  
  <line x1="450" y1="765" x2="450" y2="805" stroke="#1FA098" stroke-width="3"/>
  <polygon points="445,800 450,810 455,800" fill="#1FA098"/>
  
  <circle cx="120" cy="900" r="25" fill="#2E7D32"/>
  <text x="120" y="908" font-size="20" font-weight="bold" fill="white" text-anchor="middle">5</text>
  <rect x="170" y="820" width="600" height="170" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="190" y="850" font-size="18" font-weight="bold" fill="#2E7D32">결과 화면 (성공 표시)</text>
  <text x="190" y="880" font-size="14" fill="#1A1A1A">• 완료 메시지 + NDVI 값 해석 가이드 (펼침)</text>
  <text x="190" y="902" font-size="14" fill="#1A1A1A">• 영상 촬영일 표시 (산불 전/후)</text>
  <text x="190" y="924" font-size="14" fill="#1A1A1A">• 메트릭 3개: 산불 전 NDVI, 산불 후 NDVI, 변화량</text>
  <text x="190" y="946" font-size="14" fill="#1A1A1A">• 핵심 결과 강조 박스: 변화율 -30.2%</text>
  <text x="190" y="968" font-size="14" fill="#1A1A1A">• 인터랙티브 지도 (산불 전/후 토글)</text>
  
  <line x1="100" y1="1030" x2="800" y2="1030" stroke="#CCCCCC" stroke-width="1"/>
  <text x="450" y="1065" font-size="13" fill="#666" text-anchor="middle" font-style="italic">분석 영역: 함지산 중심 [128.5774, 35.9145] 반경 800m</text>
  <text x="450" y="1090" font-size="13" fill="#666" text-anchor="middle" font-style="italic">데이터: Sentinel-2 위성영상 (10m 해상도) | Google Earth Engine</text>
  
</svg>
